<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LorHels Systems</title>
    <style>
        /* --- ESTILOS BASE (Mismo tema que tu Dashboard) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #0b0f19; 
            color: #e2e8f0; 
            align-items: center; 
            justify-content: center; 
        }

        /* --- TARJETA DE LOGIN --- */
        .login-card {
            background-color: #1f2937;
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #374151;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-area { margin-bottom: 30px; }
        .logo-area h2 { font-size: 1.5rem; color: #ffffff; margin-bottom: 5px; }
        .badge { background-color: #374151; font-size: 0.7rem; padding: 3px 8px; border-radius: 12px; color: #d1d5db; }

        /* --- FORMULARIO --- */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: #111827;
            border: 1px solid #374151;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #6366f1; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover { background-color: #4f46e5; }
        .btn-login:disabled { background-color: #374151; cursor: not-allowed; color: #9ca3af; }

        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }

        .text-center {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .text-center a {
            color: #818cf8;
            text-decoration: none;
        }
        .text-center a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-area">
            <h2>LorHels Systems</h2>
            <span class="badge">ACCESO SEGURO</span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="admin@lorhels.com">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login" id="login-btn">Iniciar Sesión</button>
            <div class="error-message" id="error-message">Credenciales incorrectas. Inténtalo de nuevo.</div>
        </form>

        <div class="text-center">
            ¿Eres una nueva empresa? <a href="registro.html">Regístrate aquí</a>
        </div>
    </div>
    

    <script type="module">
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        // Importamos la autenticación desde tu archivo central
        import { auth } from "./firebaseConfig.js";

        // ⚠️ CONFIGURA AQUÍ EL CORREO EXACTO DE TU USUARIO ADMINISTRADOR
        const CORREO_SUPER_ADMIN = "info@handhelsinc.net";

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMessage = document.getElementById('error-message');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.innerText = "Verificando...";
            loginBtn.disabled = true;
            errorMessage.style.display = "none";

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    
                    // --- ENRUTAMIENTO LOGÍSTICO AUTOMÁTICO ---
                    if (user.email === CORREO_SUPER_ADMIN) {
                        // Si el correo que inició sesión coincide con el tuyo, vas al panel de aprobación
                        window.location.href = "admin.html";
                    } else {
                        // Si es cualquier otro usuario (un cliente), va directo a su ERP
                        window.location.href = "dashboard.html";
                    }
                })
                .catch((error) => {
                    console.error("Error de autenticación:", error.message);
                    errorMessage.innerText = "Error: Verifica tu correo y contraseña.";
                    errorMessage.style.display = "block";
                    loginBtn.innerText = "Iniciar Sesión";
                    loginBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
