<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LorHels ERP - Enterprise Management</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- jsPDF & AutoTable para Reportes y Facturas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #1f2937; overflow: hidden; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(229, 231, 235, 0.5); }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .app-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- FIREBASE CONFIGURATION ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkQ95muJR8bNBHSjRXxEGNbiknTj4wKpo",
            authDomain: "lorhels-systems-a1ad4.firebaseapp.com",
            databaseURL: "https://lorhels-systems-a1ad4-default-rtdb.firebaseio.com",
            projectId: "lorhels-systems-a1ad4",
            storageBucket: "lorhels-systems-a1ad4.firebasestorage.app",
            messagingSenderId: "387342109322",
            appId: "1:387342109322:web:be3973a4f95e82881afb73",
            measurementId: "G-MPVX6KW40J"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Uso de variables de entorno para la configuración global de la app
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lorhels-erp-v2';

        // --- UTILS & COMPONENTS ---
        const formatMoney = (amount, currency = 'DOP') => {
            return new Intl.NumberFormat('es-DO', { style: 'currency', currency: currency }).format(amount || 0);
        };

        const formatDate = (dateStr) => {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('es-DO', { year: 'numeric', month: 'short', day: '2-digit' });
        };

        function Icon({ name, size = 20, className = "" }) {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    const kebabName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
                    iconRef.current.innerHTML = `<i data-lucide="${kebabName}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ attrs: { class: className, 'stroke-width': 1.5 }, nameAttr: 'data-lucide' });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        }

        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl border border-gray-200 app-shadow ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, variant = 'primary', icon, type = "button", disabled = false, className = "" }) => {
            const styles = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700 shadow-sm',
                secondary: 'bg-white text-gray-700 border border-gray-300 hover:bg-gray-50',
                danger: 'bg-red-50 text-red-600 hover:bg-red-100 border border-red-100',
                success: 'bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm'
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-4 py-2 rounded-lg font-medium text-sm flex items-center justify-center gap-2 transition-all disabled:opacity-50 ${styles[variant]} ${className}`}>
                    {icon && <Icon name={icon} size={16} />}
                    {children}
                </button>
            );
        };

        const Badge = ({ children, variant = 'gray' }) => {
            const styles = {
                green: 'bg-green-100 text-green-700', red: 'bg-red-100 text-red-700',
                blue: 'bg-blue-100 text-blue-700', yellow: 'bg-yellow-100 text-yellow-800',
                gray: 'bg-gray-100 text-gray-700', purple: 'bg-purple-100 text-purple-700'
            };
            return <span className={`px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wide ${styles[variant] || styles.gray}`}>{children}</span>;
        };

        const Modal = ({ isOpen, onClose, title, children, maxWidth = "max-w-2xl" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-gray-900/50 backdrop-blur-sm" onClick={onClose}></div>
                    <div className={`relative w-full ${maxWidth} bg-white rounded-2xl shadow-2xl animate-slide-up flex flex-col max-h-[90vh]`}>
                        <div className="flex justify-between items-center p-6 border-b border-gray-100">
                            <h3 className="text-lg font-bold text-gray-900">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><Icon name="X" /></button>
                        </div>
                        <div className="p-6 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- PDF GENERATORS ---
        const generateInvoicePDF = (company, invoice, client) => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            
            pdf.setFontSize(22); pdf.setTextColor(37, 99, 235); pdf.setFont("helvetica", "bold");
            pdf.text(company.name, 20, 25);
            pdf.setFontSize(10); pdf.setTextColor(100); pdf.setFont("helvetica", "normal");
            pdf.text(`RNC: ${company.rnc} | Tel: ${company.phone || '-'}`, 20, 32);
            pdf.text(company.address || '', 20, 38);
            pdf.text(`${company.email || ''} ${company.website ? '| ' + company.website : ''}`, 20, 44);

            pdf.setFillColor(243, 244, 246); pdf.roundedRect(120, 15, 70, 30, 3, 3, 'F');
            pdf.setTextColor(31, 41, 55); pdf.setFont("helvetica", "bold");
            pdf.text(invoice.type === 'quote' ? 'COTIZACIÓN' : 'FACTURA', 125, 22);
            pdf.setFont("helvetica", "normal");
            pdf.text(`N°: ${invoice.number || invoice.id.substring(0,8).toUpperCase()}`, 125, 29);
            pdf.text(`Fecha: ${formatDate(invoice.date)}`, 125, 36);
            if(invoice.dueDate) pdf.text(`Vence: ${formatDate(invoice.dueDate)}`, 125, 43);

            pdf.setFont("helvetica", "bold"); pdf.text("Facturar a:", 20, 55);
            pdf.setFont("helvetica", "normal");
            pdf.text(client?.name || 'Cliente Genérico', 20, 62);
            pdf.text(`RNC/Cédula: ${client?.rnc || 'N/A'}`, 20, 68);
            pdf.text(`Dirección: ${client?.address || 'N/A'}`, 20, 74);

            const rows = invoice.items.map(item => [
                item.name, item.qty, formatMoney(item.price, invoice.currency), formatMoney(item.price * item.qty, invoice.currency)
            ]);
            
            pdf.autoTable({
                startY: 85,
                head: [['Descripción', 'Cant.', 'Precio Unit.', 'Total']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [37, 99, 235] },
                styles: { fontSize: 9 }
            });

            const finalY = pdf.lastAutoTable.finalY + 10;
            pdf.setFont("helvetica", "normal");
            pdf.text("Subtotal:", 140, finalY); pdf.text(formatMoney(invoice.subtotal, invoice.currency), 190, finalY, { align: 'right' });
            pdf.text(`Impuesto (${invoice.taxRate || 0}%):`, 140, finalY + 7); pdf.text(formatMoney(invoice.taxAmount, invoice.currency), 190, finalY + 7, { align: 'right' });
            
            pdf.setFont("helvetica", "bold"); pdf.setFontSize(12);
            pdf.text("TOTAL:", 140, finalY + 17); pdf.text(formatMoney(invoice.total, invoice.currency), 190, finalY + 17, { align: 'right' });

            pdf.save(`${invoice.type === 'quote' ? 'Cotizacion' : 'Factura'}_${invoice.number || 'DOC'}.pdf`);
        };

        const generateStatementPDF = (company, client, transactions) => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            
            pdf.setFontSize(22); pdf.setTextColor(37, 99, 235); pdf.setFont("helvetica", "bold");
            pdf.text(company.name, 20, 25);
            pdf.setFontSize(10); pdf.setTextColor(100); pdf.setFont("helvetica", "normal");
            pdf.text(`RNC: ${company.rnc} | Tel: ${company.phone || '-'}`, 20, 32);
            pdf.text(company.address || '', 20, 38);
            
            pdf.setFillColor(243, 244, 246); pdf.roundedRect(20, 45, 170, 30, 3, 3, 'F');
            pdf.setTextColor(31, 41, 55); pdf.setFont("helvetica", "bold");
            pdf.text("ESTADO DE CUENTA", 25, 53);
            pdf.setFont("helvetica", "normal");
            pdf.text(`Cliente: ${client.name}`, 25, 60);
            pdf.text(`RNC/Cédula: ${client.rnc}`, 25, 67);
            
            const clientInvoices = transactions.filter(t => t.type === 'invoice' && t.clientId === client.id).sort((a,b)=>a.timestamp - b.timestamp);
            
            let balance = 0;
            const rows = clientInvoices.map(inv => {
                if(inv.status === 'pendiente') balance += inv.total;
                return [formatDate(inv.date), inv.number, formatMoney(inv.total), inv.status.toUpperCase()];
            });
            
            pdf.autoTable({
                startY: 80,
                head: [['Fecha', 'Factura N°', 'Monto Total', 'Estado']],
                body: rows,
                theme: 'striped',
                headStyles: { fillColor: [37, 99, 235] }
            });
            
            const finalY = pdf.lastAutoTable.finalY + 10;
            pdf.setFontSize(12); pdf.setFont("helvetica", "bold");
            pdf.text(`Balance Pendiente de Pago: ${formatMoney(balance)}`, 190, finalY, { align: 'right' });
            
            pdf.save(`Estado_Cuenta_${client.name}.pdf`);
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [user, setUser] = useState(null);
            const [globalLoading, setGlobalLoading] = useState(true);
            const [view, setView] = useState('login'); // login, admin, app
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // App Data State (Aislada por sesión de empresa)
            const [currentCompany, setCurrentCompany] = useState(null);
            const [data, setData] = useState({
                companies: [], contacts: [], items: [], transactions: [], taxes: [], expenses: []
            });

            // Firebase Auth Setup (Soporte robusto inter-sesión)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) { console.error("Auth error", error); }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setGlobalLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Data Fetching: Empresas Públicas Registradas
            useEffect(() => {
                if (!user) return;
                
                const unsubCompanies = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'companies'), (snapshot) => {
                    const comps = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    setData(prev => ({ ...prev, companies: comps }));
                    
                    if (currentCompany) {
                        const updated = comps.find(c => c.id === currentCompany.id);
                        if (updated) setCurrentCompany(updated);
                    }
                }, (error) => console.error("Error cargando empresas:", error));

                return () => unsubCompanies();
            }, [user, currentCompany]);

            // Data Fetching: Datos Físicamente Aislados por Empresa
            useEffect(() => {
                if (!user || !currentCompany) return;
                
                const cid = currentCompany.id;
                const unsubs = [];

                const collections = ['contacts', 'items', 'transactions', 'taxes', 'expenses'];
                collections.forEach(colName => {
                    // MÚLTIPLES USUARIOS: Todos leen de la colección base y se filtra por empresa para garantizar sincronización total
                    const unsub = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', colName), (snapshot) => {
                        const items = snapshot.docs
                            .map(d => ({ id: d.id, ...d.data() }))
                            .filter(doc => doc.companyId === cid);
                        setData(prev => ({ ...prev, [colName]: items }));
                    }, (error) => console.error(`Error cargando ${colName}:`, error));
                    unsubs.push(unsub);
                });

                return () => unsubs.forEach(u => u());
            }, [user, currentCompany]);

            // Database Handlers (Sincronización multi-usuario por empresa)
            const dbOps = {
                add: async (colName, payload) => {
                    // Trackeo de quién lo creó y a qué empresa pertenece
                    const finalPayload = { ...payload, timestamp: Date.now(), companyId: currentCompany?.id || null, createdBy: user.uid };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), finalPayload);
                },
                update: async (colName, id, payload) => {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id), { ...payload, lastUpdatedBy: user.uid });
                },
                delete: async (colName, id) => {
                    if(confirm("¿Eliminar registro permanentemente?")) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
                    }
                }
            };

            // Global Actions
            const loginAsAdmin = () => setView('admin');
            
            const loginToCompany = (company) => {
                if (company.status !== 'approved') return alert("Esta empresa aún no ha sido aprobada por el administrador.");
                // Limpieza estricta de estado local anterior
                setData(prev => ({ ...prev, contacts: [], items: [], transactions: [], taxes: [], expenses: [] }));
                setCurrentCompany(company);
                setView('app');
                setActiveTab('dashboard');
            };
            
            const logout = () => { 
                setData(prev => ({ ...prev, contacts: [], items: [], transactions: [], taxes: [], expenses: [] }));
                setCurrentCompany(null); 
                setView('login'); 
            };

            if (globalLoading) return <div className="h-screen flex items-center justify-center bg-gray-50"><div className="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>;

            // --- RENDER VIEWS ---
            if (view === 'login') return <LoginScreen companies={data.companies} onLogin={loginToCompany} onAdminClick={loginAsAdmin} dbOps={dbOps} />;
            if (view === 'admin') return <AdminPanel companies={data.companies} onBack={() => setView('login')} dbOps={dbOps} />;

            // --- APP LAYOUT ---
            return (
                <div className="flex h-screen bg-gray-50 overflow-hidden font-sans">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 text-slate-300 flex flex-col z-20">
                        <div className="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
                            <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold mr-3 shadow-lg shadow-blue-900/50 overflow-hidden">
                                {currentCompany?.logo ? <img src={currentCompany.logo} alt="Logo" className="w-full h-full object-cover" /> : 'L'}
                            </div>
                            <span className="text-white font-bold text-lg tracking-tight">LorHels ERP</span>
                        </div>
                        <div className="px-6 py-4 border-b border-slate-800">
                            <p className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Empresa Activa</p>
                            <p className="text-white font-medium truncate">{currentCompany.name}</p>
                            <Badge variant="blue">{currentCompany.plan} Plan</Badge>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4 px-3 space-y-1">
                            {[
                                { id: 'dashboard', label: 'Dashboard', icon: 'LayoutDashboard' },
                                { id: 'billing', label: 'Facturación', icon: 'Receipt' },
                                { id: 'finances', label: 'Finanzas & Cuentas', icon: 'Wallet' },
                                { id: 'inventory', label: 'Inventario', icon: 'Package' },
                                { id: 'contacts', label: 'Clientes / Prov.', icon: 'Users' },
                                { id: 'reports', label: 'Reportes', icon: 'BarChart3' },
                                { id: 'settings', label: 'Configuración', icon: 'Settings' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} 
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeTab === item.id ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <Icon name={item.icon} size={18} /> {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-slate-800">
                            <button onClick={logout} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm w-full p-2 rounded-lg hover:bg-slate-800">
                                <Icon name="LogOut" size={18} /> Cerrar Sesión
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-16 glass-nav flex items-center justify-between px-8 z-10">
                            <h1 className="text-xl font-bold text-gray-800 capitalize">{activeTab.replace('_', ' ')}</h1>
                            <div className="flex items-center gap-4">
                                <span className="text-sm font-medium text-gray-500">{new Date().toLocaleDateString('es-DO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</span>
                                <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold overflow-hidden shadow-sm border border-blue-200">
                                    {currentCompany?.logo ? <img src={currentCompany.logo} alt="Logo" className="w-full h-full object-cover" /> : currentCompany?.name?.charAt(0)}
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-8 animate-fade-in relative">
                            <div className="max-w-7xl mx-auto pb-20">
                                {activeTab === 'dashboard' && <DashboardView data={data} />}
                                {activeTab === 'billing' && <BillingView data={data} dbOps={dbOps} currentCompany={currentCompany} />}
                                {activeTab === 'finances' && <FinanceView data={data} dbOps={dbOps} />}
                                {activeTab === 'inventory' && <InventoryView data={data} dbOps={dbOps} />}
                                {activeTab === 'contacts' && <ContactsView data={data} dbOps={dbOps} currentCompany={currentCompany} />}
                                {activeTab === 'reports' && <ReportsView data={data} />}
                                {activeTab === 'settings' && <SettingsView data={data} dbOps={dbOps} currentCompany={currentCompany} />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // ==========================================
        // MODULE VIEWS
        // ==========================================

        // --- 1. LOGIN & ONBOARDING ---
        const LoginScreen = ({ companies, onLogin, onAdminClick, dbOps }) => {
            const [mode, setMode] = useState('select');
            const [selected, setSelected] = useState(null);
            const [pin, setPin] = useState('');

            const handleCreate = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const payload = Object.fromEntries(fd.entries());
                
                try {
                    await dbOps.add('companies', {
                        ...payload,
                        status: 'pending',
                        nextInvoiceNum: 1, nextQuoteNum: 1
                    });
                    alert("Solicitud enviada. Un administrador revisará la cuenta.");
                    setMode('select');
                } catch (err) { alert(err.message); }
            };

            const doLogin = (e) => {
                e.preventDefault();
                if(selected.staticPin === pin) onLogin(selected);
                else { alert("PIN Incorrecto"); setPin(''); }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 relative">
                    <button onClick={onAdminClick} className="absolute top-6 right-8 text-gray-400 hover:text-gray-900 transition flex gap-2 items-center text-sm font-medium">
                        <Icon name="Shield" size={16} /> Admin
                    </button>
                    
                    <div className="sm:mx-auto sm:w-full sm:max-w-md text-center">
                        <div className="mx-auto w-16 h-16 bg-blue-600 rounded-2xl shadow-xl flex items-center justify-center text-white text-3xl font-black mb-6">LH</div>
                        <h2 className="text-center text-3xl font-extrabold text-gray-900 tracking-tight">LorHels Systems</h2>
                        <p className="mt-2 text-center text-sm text-gray-600">Enterprise Resource Planning</p>
                    </div>

                    <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-slide-up">
                        <Card className="p-8">
                            {mode === 'select' && (
                                <div className="space-y-6">
                                    <div>
                                        <h3 className="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Empresas Activas</h3>
                                        <div className="space-y-3 max-h-64 overflow-y-auto">
                                            {companies.filter(c => c.status === 'approved').map(c => (
                                                <button key={c.id} onClick={() => { setSelected(c); setMode('pin'); }} className="w-full flex items-center justify-between p-4 border border-gray-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition text-left group">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center overflow-hidden border border-gray-200">
                                                            {c.logo ? <img src={c.logo} alt="Logo" className="w-full h-full object-cover" /> : <span className="font-bold text-gray-500">{c.name.charAt(0)}</span>}
                                                        </div>
                                                        <div><p className="font-bold text-gray-900">{c.name}</p><p className="text-xs text-gray-500">RNC: {c.rnc}</p></div>
                                                    </div>
                                                    <Icon name="ChevronRight" className="text-gray-400 group-hover:text-blue-500" />
                                                </button>
                                            ))}
                                            {companies.filter(c => c.status === 'approved').length === 0 && <p className="text-sm text-gray-500 italic text-center py-4">No hay empresas aprobadas aún.</p>}
                                        </div>
                                    </div>
                                    <Button variant="secondary" className="w-full" onClick={() => setMode('create')}>Crear Solicitud de Empresa</Button>
                                </div>
                            )}

                            {mode === 'pin' && (
                                <form onSubmit={doLogin} className="space-y-6 text-center">
                                    <h3 className="text-lg font-bold text-gray-900">{selected?.name}</h3>
                                    <p className="text-sm text-gray-500 mb-4">Ingrese su PIN de seguridad de 4 dígitos</p>
                                    <input type="password" maxLength="4" autoFocus value={pin} onChange={e=>setPin(e.target.value)} className="w-full text-center text-4xl tracking-[1em] p-4 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required />
                                    <div className="flex gap-3">
                                        <Button variant="secondary" className="flex-1" onClick={() => {setMode('select'); setPin('');}}>Volver</Button>
                                        <Button type="submit" className="flex-1">Entrar</Button>
                                    </div>
                                </form>
                            )}

                            {mode === 'create' && (
                                <form onSubmit={handleCreate} className="space-y-4">
                                    <h3 className="text-lg font-bold text-gray-900 border-b pb-2">Nueva Empresa</h3>
                                    <input name="name" placeholder="Nombre Comercial" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="rep" placeholder="Nombre del Representante" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="rnc" placeholder="RNC / Identificación" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="email" type="email" placeholder="Correo Electrónico" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="phone" placeholder="Número de Contacto" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="address" placeholder="Dirección Física" required className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="website" placeholder="Sitio Web (Opcional)" className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    <input name="logo" placeholder="URL del Logo (Opcional)" className="w-full p-3 border border-gray-300 rounded-lg text-sm" />
                                    
                                    <select name="plan" className="w-full p-3 border border-gray-300 rounded-lg text-sm bg-white" required>
                                        <option value="">Seleccione un Plan...</option>
                                        <option value="Basico">Plan Básico (15 Días Prueba)</option>
                                        <option value="Pro">Plan Profesional (3 Meses)</option>
                                        <option value="Enterprise">Plan Empresarial (Anual)</option>
                                    </select>
                                    <input name="staticPin" type="password" maxLength="4" placeholder="Cree un PIN (4 dígitos)" required className="w-full p-3 border border-blue-300 bg-blue-50 rounded-lg text-sm tracking-widest text-center font-bold" />
                                    <div className="flex gap-3 pt-2">
                                        <Button variant="secondary" className="flex-1" onClick={() => setMode('select')}>Cancelar</Button>
                                        <Button type="submit" className="flex-1">Enviar Solicitud</Button>
                                    </div>
                                </form>
                            )}
                        </Card>
                    </div>
                </div>
            );
        };

        // --- 2. ADMIN PANEL ---
        const AdminPanel = ({ companies, onBack, dbOps }) => {
            const [logged, setLogged] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                if (e.target.user.value === 'Handhels' && e.target.pass.value === 'Handhels01') setLogged(true);
                else alert("Credenciales incorrectas");
            };

            const approve = async (c) => {
                let days = 15;
                if(c.plan === 'Pro') days = 90;
                if(c.plan === 'Enterprise') days = 365;
                const expiry = new Date(); expiry.setDate(expiry.getDate() + days);
                
                await dbOps.update('companies', c.id, {
                    status: 'approved', expiryDate: expiry.toISOString()
                });
            };

            const reject = async (id) => {
                await dbOps.delete('companies', id);
            };

            if (!logged) return (
                <div className="h-screen flex items-center justify-center bg-slate-900">
                    <Card className="p-8 w-full max-w-md bg-white">
                        <div className="text-center mb-6">
                            <Icon name="ShieldCheck" size={48} className="mx-auto text-slate-800 mb-4" />
                            <h2 className="text-2xl font-bold text-gray-900">Acceso Master</h2>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input name="user" placeholder="Usuario" className="w-full p-3 border border-gray-300 rounded-lg" required />
                            <input name="pass" type="password" placeholder="Contraseña" className="w-full p-3 border border-gray-300 rounded-lg" required />
                            <div className="flex gap-3 pt-4">
                                <Button variant="secondary" onClick={onBack} className="flex-1">Volver</Button>
                                <Button type="submit" className="flex-1 bg-slate-800 hover:bg-slate-900 text-white">Entrar</Button>
                            </div>
                        </form>
                    </Card>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 p-8">
                    <div className="max-w-5xl mx-auto space-y-6">
                        <div className="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                            <div><h1 className="text-2xl font-bold text-gray-900">Panel de Administración</h1><p className="text-gray-500">Gestión de licencias y empresas</p></div>
                            <Button variant="secondary" onClick={onBack} icon="LogOut">Salir</Button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <Card className="p-6">
                                <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><Icon name="Clock" className="text-yellow-500"/> Solicitudes Pendientes</h3>
                                <div className="space-y-3">
                                    {companies.filter(c => c.status === 'pending').map(c => (
                                        <div key={c.id} className="p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
                                            <div className="flex justify-between items-start mb-3">
                                                <div><p className="font-bold text-gray-900">{c.name}</p><p className="text-xs text-gray-600">RNC: {c.rnc} | Plan: {c.plan}</p></div>
                                                <Badge variant="yellow">Pendiente</Badge>
                                            </div>
                                            <div className="flex gap-2">
                                                <Button variant="danger" className="flex-1 py-1 text-xs" onClick={()=>reject(c.id)}>Rechazar</Button>
                                                <Button variant="success" className="flex-1 py-1 text-xs" onClick={()=>approve(c)}>Aprobar ({c.plan})</Button>
                                            </div>
                                        </div>
                                    ))}
                                    {companies.filter(c=>c.status==='pending').length === 0 && <p className="text-sm text-gray-500 italic">No hay solicitudes nuevas.</p>}
                                </div>
                            </Card>

                            <Card className="p-6">
                                <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><Icon name="CheckCircle" className="text-green-500"/> Empresas Activas</h3>
                                <div className="space-y-3 max-h-[60vh] overflow-y-auto">
                                    {companies.filter(c => c.status === 'approved').map(c => (
                                        <div key={c.id} className="p-3 bg-white border border-gray-200 rounded-xl flex justify-between items-center">
                                            <div>
                                                <p className="font-bold text-gray-800 text-sm">{c.name}</p>
                                                <p className="text-[10px] text-gray-500">Vence: {formatDate(c.expiryDate)}</p>
                                            </div>
                                            <Button variant="secondary" className="px-2 py-1 text-red-500 hover:text-red-700 hover:bg-red-50" onClick={()=>reject(c.id)}><Icon name="Trash" size={14}/></Button>
                                        </div>
                                    ))}
                                </div>
                            </Card>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3. DASHBOARD ---
        const DashboardView = ({ data }) => {
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();

            // Calculate metrics
            const metrics = useMemo(() => {
                let sales = 0, expenses = 0, ar = 0;
                
                data.transactions.forEach(t => {
                    if (t.type === 'invoice' && t.status !== 'anulada') {
                        const tDate = new Date(t.date);
                        if (tDate.getMonth() === currentMonth && tDate.getFullYear() === currentYear) sales += t.total;
                        if (t.status === 'pendiente') ar += t.total; // AR = facturas pendientes
                    }
                });

                data.expenses.forEach(e => {
                    const eDate = new Date(e.date);
                    if (eDate.getMonth() === currentMonth && eDate.getFullYear() === currentYear) expenses += e.amount;
                });

                return { sales, expenses, profit: sales - expenses, ar };
            }, [data]);

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <Card className="p-6 border-l-4 border-l-blue-500"><p className="text-sm font-semibold text-gray-500 mb-1">Ventas (Mes Actual)</p><h3 className="text-2xl font-bold text-gray-900">{formatMoney(metrics.sales)}</h3></Card>
                        <Card className="p-6 border-l-4 border-l-red-500"><p className="text-sm font-semibold text-gray-500 mb-1">Gastos (Mes Actual)</p><h3 className="text-2xl font-bold text-gray-900">{formatMoney(metrics.expenses)}</h3></Card>
                        <Card className="p-6 border-l-4 border-l-emerald-500"><p className="text-sm font-semibold text-gray-500 mb-1">Beneficio Neto</p><h3 className="text-2xl font-bold text-emerald-600">{formatMoney(metrics.profit)}</h3></Card>
                        <Card className="p-6 border-l-4 border-l-yellow-500"><p className="text-sm font-semibold text-gray-500 mb-1">Cuentas por Cobrar</p><h3 className="text-2xl font-bold text-yellow-600">{formatMoney(metrics.ar)}</h3></Card>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <Card className="p-6">
                            <h3 className="font-bold text-gray-900 mb-4">Últimas Facturas</h3>
                            <div className="space-y-3">
                                {data.transactions.filter(t=>t.type==='invoice').sort((a,b)=>b.timestamp - a.timestamp).slice(0,5).map(i => (
                                    <div key={i.id} className="flex justify-between items-center p-3 hover:bg-gray-50 rounded-lg">
                                        <div><p className="font-medium text-sm text-gray-800">{i.clientName}</p><p className="text-xs text-gray-500">N° {i.number} • {formatDate(i.date)}</p></div>
                                        <div className="text-right"><p className="font-bold text-sm">{formatMoney(i.total)}</p><Badge variant={i.status === 'pagada' ? 'green' : 'yellow'}>{i.status}</Badge></div>
                                    </div>
                                ))}
                            </div>
                        </Card>
                        <Card className="p-6">
                            <h3 className="font-bold text-gray-900 mb-4">Stock Bajo (Productos)</h3>
                            <div className="space-y-3">
                                {data.items.filter(i=>i.type==='product' && i.trackStock && parseInt(i.stock) <= parseInt(i.minStock)).map(p => (
                                    <div key={p.id} className="flex justify-between items-center p-3 border border-red-100 bg-red-50 rounded-lg">
                                        <div><p className="font-medium text-sm text-gray-800">{p.name}</p><p className="text-xs text-gray-500">Mínimo: {p.minStock}</p></div>
                                        <div className="text-right"><p className="font-black text-red-600 text-lg">{p.stock}</p><p className="text-[10px] uppercase font-bold text-red-400">En Stock</p></div>
                                    </div>
                                ))}
                                {data.items.filter(i=>i.type==='product' && i.trackStock && parseInt(i.stock) <= parseInt(i.minStock)).length === 0 && <p className="text-sm text-gray-500 italic">No hay alertas de inventario.</p>}
                            </div>
                        </Card>
                    </div>
                </div>
            );
        };

        // --- 4. BILLING ---
        const BillingView = ({ data, dbOps, currentCompany }) => {
            const [tab, setTab] = useState('invoice'); // invoice, quote
            const [isModalOpen, setModalOpen] = useState(false);
            const [form, setForm] = useState(null);

            const openNewDoc = (type) => {
                setForm({
                    type, status: 'pendiente', date: new Date().toISOString().split('T')[0], dueDate: '',
                    clientId: '', clientName: '', currency: 'DOP', taxId: '', items: [], note: ''
                });
                setModalOpen(true);
            };

            const calculateTotals = (items, taxId) => {
                const subtotal = items.reduce((sum, item) => sum + (item.price * item.qty), 0);
                const taxDef = data.taxes.find(t => t.id === taxId);
                const taxRate = taxDef ? parseFloat(taxDef.rate) : 0;
                const taxAmount = subtotal * (taxRate / 100);
                return { subtotal, taxAmount, total: subtotal + taxAmount, taxRate };
            };

            const saveDoc = async (e) => {
                e.preventDefault();
                if(form.items.length === 0) return alert("Agregue al menos un artículo.");
                if(!form.clientId) return alert("Seleccione un cliente.");
                
                const client = data.contacts.find(c => c.id === form.clientId);
                const { subtotal, taxAmount, total, taxRate } = calculateTotals(form.items, form.taxId);
                
                let docNumber = form.number;
                if (!form.id) {
                    const numField = form.type === 'invoice' ? 'nextInvoiceNum' : 'nextQuoteNum';
                    const currentNum = currentCompany[numField] || 1;
                    docNumber = `${form.type === 'invoice' ? 'FAC' : 'COT'}-${currentNum.toString().padStart(5, '0')}`;
                    await dbOps.update('companies', currentCompany.id, { [numField]: currentNum + 1 });
                }

                const payload = { ...form, clientName: client.name, subtotal, taxAmount, taxRate, total, number: docNumber };

                if (form.id) await dbOps.update('transactions', form.id, payload);
                else {
                    await dbOps.add('transactions', payload);
                    if (form.type === 'invoice') {
                        for (const item of form.items) {
                            if (item.trackStock) {
                                const dbItem = data.items.find(i => i.id === item.itemId);
                                if (dbItem) await dbOps.update('items', dbItem.id, { stock: parseInt(dbItem.stock) - item.qty });
                            }
                        }
                    }
                }
                setModalOpen(false);
            };

            const convertQuoteToInvoice = async (quote) => {
                if(!confirm("¿Convertir en Factura?")) return;
                const num = currentCompany.nextInvoiceNum || 1;
                const docNumber = `FAC-${num.toString().padStart(5, '0')}`;
                await dbOps.update('companies', currentCompany.id, { nextInvoiceNum: num + 1 });
                
                const newInv = { ...quote, type: 'invoice', status: 'pendiente', number: docNumber, quoteId: quote.id };
                delete newInv.id;
                await dbOps.add('transactions', newInv);
                await dbOps.update('transactions', quote.id, { status: 'facturada' });
                setTab('invoice');
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <div className="flex gap-2 bg-white p-1 rounded-lg border border-gray-200">
                            <button onClick={()=>setTab('invoice')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${tab==='invoice'?'bg-blue-50 text-blue-700':'text-gray-500 hover:text-gray-700'}`}>Facturas</button>
                            <button onClick={()=>setTab('quote')} className={`px-4 py-1.5 rounded-md text-sm font-medium ${tab==='quote'?'bg-blue-50 text-blue-700':'text-gray-500 hover:text-gray-700'}`}>Cotizaciones</button>
                        </div>
                        <Button icon="Plus" onClick={() => openNewDoc(tab)}>Crear {tab === 'invoice' ? 'Factura' : 'Cotización'}</Button>
                    </div>

                    <Card className="overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gray-50 border-b border-gray-200 text-gray-500">
                                <tr><th className="p-4 font-semibold">Documento</th><th className="p-4 font-semibold">Fecha</th><th className="p-4 font-semibold">Cliente</th><th className="p-4 font-semibold">Total</th><th className="p-4 font-semibold text-center">Estado</th><th className="p-4 font-semibold text-center">Acciones</th></tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {data.transactions.filter(t => t.type === tab).sort((a,b)=>b.timestamp - a.timestamp).map(doc => (
                                    <tr key={doc.id} className="hover:bg-gray-50">
                                        <td className="p-4 font-medium text-gray-900">{doc.number}</td>
                                        <td className="p-4 text-gray-500">{formatDate(doc.date)}</td>
                                        <td className="p-4">{doc.clientName}</td>
                                        <td className="p-4 font-bold">{formatMoney(doc.total, doc.currency)}</td>
                                        <td className="p-4 text-center">
                                            <Badge variant={doc.status==='pagada'||doc.status==='facturada' ? 'green' : doc.status==='anulada'?'red':'yellow'}>{doc.status}</Badge>
                                        </td>
                                        <td className="p-4 text-center space-x-2">
                                            <button onClick={()=>generateInvoicePDF(currentCompany, doc, data.contacts.find(c=>c.id===doc.clientId))} className="text-gray-400 hover:text-blue-600"><Icon name="FileDown" size={18}/></button>
                                            {tab === 'quote' && doc.status === 'pendiente' && (
                                                <button onClick={()=>convertQuoteToInvoice(doc)} className="text-gray-400 hover:text-green-600" title="Convertir a Factura"><Icon name="ArrowRightLeft" size={18}/></button>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                                {data.transactions.filter(t => t.type === tab).length === 0 && <tr><td colSpan="6" className="p-8 text-center text-gray-500 italic">No hay documentos registrados.</td></tr>}
                            </tbody>
                        </table>
                    </Card>

                    {/* CREATE DOC MODAL */}
                    <Modal isOpen={isModalOpen} onClose={() => setModalOpen(false)} title={`Nueva ${form?.type === 'invoice' ? 'Factura' : 'Cotización'}`} maxWidth="max-w-4xl">
                        {form && (
                            <form onSubmit={saveDoc} className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-xs font-bold text-gray-500 uppercase">Cliente</label>
                                            <select value={form.clientId} onChange={e=>setForm({...form, clientId: e.target.value})} className="w-full p-2 border rounded-lg mt-1 text-sm" required>
                                                <option value="">Seleccionar...</option>
                                                {data.contacts.filter(c=>c.type==='client').map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                            </select>
                                        </div>
                                        <div><label className="text-xs font-bold text-gray-500 uppercase">Fecha</label>
                                            <input type="date" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} className="w-full p-2 border rounded-lg mt-1 text-sm" required/>
                                        </div>
                                    </div>
                                    
                                    {/* Item Selector */}
                                    <div className="border rounded-xl p-4 bg-gray-50">
                                        <h4 className="text-sm font-bold text-gray-700 mb-2">Añadir Artículos</h4>
                                        <div className="max-h-40 overflow-y-auto space-y-1">
                                            {data.items.map(item => (
                                                <div key={item.id} className="flex justify-between items-center bg-white p-2 rounded border border-gray-100 shadow-sm">
                                                    <div><p className="text-sm font-medium">{item.name}</p><p className="text-xs text-gray-500">{formatMoney(item.price)} | Disp: {item.trackStock?item.stock:'∞'}</p></div>
                                                    <Button variant="secondary" className="px-2 py-1" onClick={() => {
                                                        const existing = form.items.find(i=>i.itemId === item.id);
                                                        if(existing) setForm({...form, items: form.items.map(i=>i.itemId===item.id ? {...i, qty: i.qty+1}:i)});
                                                        else setForm({...form, items: [...form.items, {itemId: item.id, name: item.name, price: item.price, qty: 1, trackStock: item.trackStock}]});
                                                    }}><Icon name="Plus" size={14}/></Button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Added Items List */}
                                    <div className="space-y-2">
                                        {form.items.map((item, idx) => (
                                            <div key={idx} className="flex items-center gap-3 p-3 bg-white border border-gray-200 rounded-lg">
                                                <span className="flex-1 font-medium text-sm">{item.name}</span>
                                                <input type="number" min="1" value={item.qty} onChange={e=>{
                                                    const nItems = [...form.items]; nItems[idx].qty = parseInt(e.target.value)||1; setForm({...form, items: nItems});
                                                }} className="w-20 p-1 border rounded text-center text-sm" />
                                                <span className="w-24 text-right font-bold text-sm">{formatMoney(item.price * item.qty)}</span>
                                                <button type="button" onClick={()=>{
                                                    setForm({...form, items: form.items.filter((_,i)=>i!==idx)});
                                                }} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={16}/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="space-y-4 bg-gray-50 p-6 rounded-xl border border-gray-200 h-fit">
                                    <h4 className="font-bold text-gray-900 border-b pb-2">Resumen</h4>
                                    <div><label className="text-xs font-bold text-gray-500 uppercase">Impuesto</label>
                                        <select value={form.taxId} onChange={e=>setForm({...form, taxId: e.target.value})} className="w-full p-2 border rounded-lg mt-1 text-sm">
                                            <option value="">Ninguno</option>
                                            {data.taxes.map(t => <option key={t.id} value={t.id}>{t.name} ({t.rate}%)</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2 pt-4 border-t text-sm">
                                        {(() => {
                                            const {subtotal, taxAmount, total} = calculateTotals(form.items, form.taxId);
                                            return (
                                                <>
                                                    <div className="flex justify-between text-gray-600"><span>Subtotal</span><span>{formatMoney(subtotal)}</span></div>
                                                    <div className="flex justify-between text-gray-600"><span>Impuestos</span><span>{formatMoney(taxAmount)}</span></div>
                                                    <div className="flex justify-between font-bold text-lg text-gray-900 pt-2 border-t mt-2"><span>Total</span><span>{formatMoney(total)}</span></div>
                                                </>
                                            )
                                        })()}
                                    </div>
                                    <Button type="submit" className="w-full py-3 mt-4" icon="Save">Guardar Documento</Button>
                                </div>
                            </form>
                        )}
                    </Modal>
                </div>
            );
        };

        // --- 5. INVENTORY ---
        const InventoryView = ({ data, dbOps }) => {
            const [isModalOpen, setModalOpen] = useState(false);
            const [form, setForm] = useState(null);

            const openForm = (item = null) => {
                setForm(item || { type: 'product', code: '', name: '', cost: 0, price: 0, stock: 0, minStock: 5, trackStock: true });
                setModalOpen(true);
            };

            const saveItem = async (e) => {
                e.preventDefault();
                const payload = { ...form, cost: parseFloat(form.cost), price: parseFloat(form.price), stock: parseInt(form.stock), minStock: parseInt(form.minStock) };
                if (form.id) await dbOps.update('items', form.id, payload);
                else await dbOps.add('items', payload);
                setModalOpen(false);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-gray-800">Catálogo e Inventario</h2>
                        <Button icon="Plus" onClick={() => openForm()}>Nuevo Artículo</Button>
                    </div>

                    <Card className="overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-gray-50 border-b border-gray-200 text-gray-500">
                                <tr><th className="p-4 font-semibold">Cód.</th><th className="p-4 font-semibold">Nombre</th><th className="p-4 font-semibold">Tipo</th><th className="p-4 font-semibold text-right">Precio Venta</th><th className="p-4 font-semibold text-center">Stock</th><th className="p-4 font-semibold text-center">Acciones</th></tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {data.items.map(item => (

                const payload = { ...form, creditLimit: parseFloat(form.creditLimit) };

                setModalOpen(false);

                    setViewMode('detail');

            // VISTA DE PERFIL DE CLIENTE

                const clientInvs = data.transactions.filter(t => t.type === 'invoice' && t.clientId === selectedContact.id).sort((a,b)=>b.timestamp - a.timestamp);

                    <div className="space-y-6 animate-fade-in">

                            <Badge variant="blue">INFO 360</Badge>

                            </form>

                </div>

                                {data.transactions.filter(t=>t.type==='invoice' && t.status==='pendiente').map(inv => (

            // Estado controlado para todos los nuevos campos de la empresa

                name: currentCompany.name || '',
                rep: currentCompany.rep || '',
                rnc: currentCompany.rnc || '',
                email: currentCompany.email || '',
                phone: currentCompany.phone || '',

                nextInvoiceNum: currentCompany.nextInvoiceNum || 1,

            });

                    name: currentCompany.name || '',

                    website: currentCompany.website || '',

                                </div>
                            </div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase">Dirección Física</label>
                                <input value={profileForm.address} onChange={e=>setProfileForm({...profileForm, address: e.target.value})} required className="w-full p-2 border rounded-lg mt-1" />
                            </div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase">URL del Logo de la Empresa</label>
                                <input value={profileForm.logo} onChange={e=>setProfileForm({...profileForm, logo: e.target.value})} placeholder="https://ejemplo.com/logo.png" className="w-full p-2 border rounded-lg mt-1" />
                            </div>
                            
                            <h4 className="font-bold text-sm text-gray-700 mt-6 mb-2">Secuencias de Numeración</h4>
                            <div className="grid grid-cols-2 gap-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
                                <div><label className="text-xs font-bold text-gray-500 uppercase">Próx. Factura</label>
                                    <input type="number" value={profileForm.nextInvoiceNum} onChange={e=>setProfileForm({...profileForm, nextInvoiceNum: e.target.value})} required className="w-full p-2 border rounded-lg mt-1 font-mono" />
                                </div>
                                <div><label className="text-xs font-bold text-gray-500 uppercase">Próx. Cotización</label>
                                    <input type="number" value={profileForm.nextQuoteNum} onChange={e=>setProfileForm({...profileForm, nextQuoteNum: e.target.value})} required className="w-full p-2 border rounded-lg mt-1 font-mono" />
                                </div>
                            </div>

                            <Button type="submit" className="w-full mt-4">Guardar Cambios</Button>
                        </form>
                    </Card>

                    <Card className="p-6 h-fit">
                        <h3 className="text-lg font-bold text-gray-900 mb-6 border-b pb-2">Gestión de Impuestos</h3>
                        <form onSubmit={addTax} className="flex gap-2 mb-6">
                            <input value={taxForm.name} onChange={e=>setTaxForm({...taxForm, name:e.target.value})} placeholder="Nombre (ej. ITBIS)" required className="flex-1 p-2 border rounded-lg text-sm" />
                            <input type="number" step="0.01" value={taxForm.rate} onChange={e=>setTaxForm({...taxForm, rate:e.target.value})} placeholder="%" required className="w-20 p-2 border rounded-lg text-sm text-center" />
                            <Button type="submit" icon="Plus">Añadir</Button>
                        </form>
                        <div className="space-y-2">
                            {data.taxes.map(t => (
                                <div key={t.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                                    <span className="font-medium text-gray-700">{t.name}</span>
                                    <div className="flex items-center gap-4">
                                        <span className="font-bold text-blue-600">{t.rate}%</span>
                                        <button onClick={()=>dbOps.delete('taxes', t.id)} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={16}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </Card>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
